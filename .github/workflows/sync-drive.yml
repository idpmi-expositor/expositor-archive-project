name: Sync Google Drive folder

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview changes without committing
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: google-drive-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ExpositorMain from Google Drive
    runs-on: ubuntu-latest

    env:
      DRIVE_REMOTE: gdrive
      DRIVE_FOLDER_ID: 18J7kB4mUpNU7J7aPn17xl7SQOSYYyO7n
      DESTINATION_DIR: ExpositorMain

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
        run: |
          if [ -z "$RCLONE_CONFIG_CONTENT" ]; then
            echo "Missing required repository secret: RCLONE_CONFIG" >&2
            exit 1
          fi
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf
          rclone listremotes

      - name: Sync Drive folder into repository
        env:
          DRIVE_SOURCE: "${{ env.DRIVE_REMOTE }},root_folder_id=${{ env.DRIVE_FOLDER_ID }}:"
        run: |
          mkdir -p "$DESTINATION_DIR"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            rclone copy "$DRIVE_SOURCE" "$DESTINATION_DIR" --drive-export-formats docx,xlsx,pptx,pdf --dry-run --verbose
          else
            rclone sync "$DRIVE_SOURCE" "$DESTINATION_DIR" --drive-export-formats docx,xlsx,pptx,pdf --verbose
          fi

      - name: Commit synced files
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DESTINATION_DIR"
          if git diff --cached --quiet; then
            echo "No Drive changes to commit."
          else
            git commit -m "Sync Google Drive folder"
            git push
          fi
