# GitHub Actions workflow to sync the ExpositorMain folder from Google Drive.
#
# This workflow is manually triggered and allows for a dry run before
# committing any changes. It uses rclone and requires the RCLONE_CONFIG
# secret to be configured in the repository settings as per
# docs/google-drive-sync.md.

name: Sync Google Drive folder

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run rclone with --dry-run to preview changes without applying them.'
        required: true
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get -y install rclone

      - name: Configure rclone
        run: |
          echo "Configuring rclone from repository secret..."
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf
          echo "rclone config created."

      - name: Sync from Google Drive
        env:
          # Set --dry-run flag if the workflow input is true, otherwise set an empty string.
          DRY_RUN_FLAG: ${{ github.event.inputs.dry_run && '--dry-run' || '' }}
        run: |
          echo "Syncing from Google Drive..."
          # The Drive folder ID for ExpositorMain, from docs/google-drive-sync.md
          DRIVE_FOLDER_ID="18J7kB4mUpNU7J7aPn17xl7SQOSYYyO7n"
          REMOTE_PATH="gdrive,root_folder_id=$DRIVE_FOLDER_ID:"
          LOCAL_PATH="ExpositorMain"

          # Run the sync command. --verbose shows transferred files.
          rclone sync "$REMOTE_PATH" "$LOCAL_PATH" --verbose $DRY_RUN_FLAG

      - name: Commit and push changes
        if: ${{ !github.event.inputs.dry_run }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Sync ExpositorMain from Google Drive"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"