# GitHub Actions CI workflow for the Expositor Archive Project.
#
# This workflow automatically runs tests on every push and pull request to the
# main branch, ensuring that core functionality remains stable.

name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage flake8
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: |
          coverage run -m unittest discover -s tests

      - name: Generate coverage report
        run: |
          coverage report -m --fail-under=80
          coverage html

      - name: Generate draft YAML files
        run: |
          python scripts/canonical/06_yaml_generator.py

      - name: Build provisional indexes (safety check)
        run: |
          python scripts/canonical/08_index_builder.py archive/drafts --output-dir indexes/provisional --allow-unreviewed

      - name: Run schema validator on canonical archive
        run: |
          python scripts/canonical/07_schema_validator.py

      - name: Build official indexes (safety check)
        run: |
          python scripts/canonical/08_index_builder.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov