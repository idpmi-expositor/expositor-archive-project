# GitHub Actions CI workflow for the Expositor Archive Project.
#
# This workflow automatically runs tests on every push and pull request to the
# main branch, ensuring that core functionality remains stable.

name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          python -m unittest discover -s tests

      - name: Run schema validator on empty archive (safety check)
        run: |
          python scripts/canonical/07_schema_validator.py