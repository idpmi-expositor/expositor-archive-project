    items:
    - I. Exhortación a imitar la excelencia de la entrega
    - de Cristo (Filipenses 2:1-4)
    - A. Prótasis y apódosis de la frase condicional (Flp 2:1-2)
    - B. El mayor ejemplo de humildad (Flp 2:3-4)
