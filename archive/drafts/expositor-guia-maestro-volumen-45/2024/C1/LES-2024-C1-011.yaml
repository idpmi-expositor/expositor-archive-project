    - B. De la humillación de Cristo a su exaltación (Flp 2:9-11)
    - III. Resumen y aplicación práctica
  teacher_notes:
    items:
    - 1. ¿Cómo se explica la kenosis a la luz del himno
    - cristológico?
    - 2. ¿Qué es la «teología kenótica» y cuáles son sus
    - representantes?
    - 3. ¿Cuál es el impacto del modelo cristológico en
    - nuestra sociedad moderna? Esta tercera lección sobre el estudio a la carta a
      los Filipenses analiza lo que es considerado por muchos como el pasaje clave
      de toda la epístola y uno de los textos más importantes sobre la preexistencia,
      divinidad, humillación y exaltación de Cristo en todo el NT. Con ello, Pablo
      quiere asegurarles a sus lectores que el verdadero carácter de Dios se revela
      en la entrega en favor de los demás, acción llevada a cabo por medio de Cristo.
