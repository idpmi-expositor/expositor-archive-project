        text: 'El hombre recibe la sanidad y esta se describe: “fueron abiertos sus oídos y se desató la ligadura de su lengua”. Pero el maestro ordenó inmediatamente a que no dijesen nada. No obstante, cuánto más lo ordenaba, más lo hacían. Así que no solo la ligadura de la lengua del tartamudo fue liberada, sino la de las multitudes al ser testigos de aquel milagro. El autor del evangelio utiliza el termino griego (juperperisós), se traduce como asombro desmedido,'
