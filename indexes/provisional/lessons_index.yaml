    teacher_notes:
      item_count: 15
      items:
      - item_id: LES-2024-C1-022-teacher-notes-001
        order: 1
        kind: paragraph
        text: '1. «se admiraban»: Literalmente esto significa'
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-002
        order: 2
        kind: paragraph
        text: “llamar la atención”. El estilo y el contenido de las enseñanzas de Jesús eran radicalmente distintos al de los rabinos, quienes se citaban unos a otros como autoridades; pero él hablaba con la autoridad de Dios (Mateo 5:17–48).
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-003
        order: 3
        kind: paragraph
        text: '2. «un hombre con un espíritu inmundo»:'
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-004
        order: 4
        kind: paragraph
        text: Es un caso de posesión demoníaca (v. 34). Observe que este hombre estaba en el culto, manteniendo la apariencia. El Nuevo Testamento distingue entre las enfermedades físicas y la posesión demoníaca, aunque a veces ambas tenían los mismos síntomas. En estos casos, el demonio controlaba a la persona, quien había perdido su propia voluntad.
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-005
        order: 5
        kind: paragraph
        text: 176 Maestro las autoridades, pero que Jesús habló con autoridad. Los escribas enseñaban utilizando la autoridad de las Sagradas Escrituras, pero Jesús educaba como la autoridad. Para sorpresa de los judíos, Jesús se presentaba al mismo nivel de autoridad que los Rollos Sagrados; no iba cambiar lo escrito, sino a cumplir lo dicho por Moisés, salmos y profetas (Lucas 24:44). Ante esta realidad, los escribas tenían dos opciones, aceptar a Jesús como autoridad o perseguirlo, convertirse en copistas del evangelio o enmudecer. El creyente tiene la responsabilidad de someterse a la autoridad de Dios. La Iglesia tiene que someterse a Cristo, como él obedeció al Padre; esto es doblegar nuestra voluntad. Es imposible proclamar la autoridad de Cristo sobre nuestras vidas siendo desobedientes, contumaces, avaros, pendencieros, hipócritas, entre otros. Tampoco podemos acercarnos a Dios con la actitud de los escribas que, siendo copistas de la ley, se hicieron dueños de la interpretación, e incapaces de apreciar los milagros de Dios. El mensajero nunca será dueño del mensaje.
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-006
        order: 6
        kind: letter_subpoint
        text: B. El endemoniado de la sinagoga –
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-007
        order: 7
        kind: paragraph
        text: '(Marcos 1:23-26) La autoridad de Jesús no hace énfasis a su fogosidad al hablar, ni mucho menos al timbre de su voz. Esto se refiere a la capacidad de imponerse como máxima potestad entre los demás. La autoridad de Jesús sería confrontada tanto por los escribas como por los espíritus inmundos. Nuestro Señor estableció su centro de operaciones en Capernaum, posiblemente en la casa de Pedro y Andrés o en sus proximidades (Marcos 1:29). Cuando se visita la Tierra Santa hoy, se pueden ver las ruinas de la sinagoga de Capernaum, pero no es la misma en la que Jesús adoró. La gente se reunía para los cultos en el sábado, así como los lunes y los jueves. Siendo un judío fiel, Jesús honraba el sábado asistiendo a la sinagoga; y cuando enseñaba la Palabra, la gente se quedaba atónita por su autoridad. No tenemos mucha información sobre el hombre endemoniado en la sinagoga, ni tampoco a cuántos cultos habría asistido sin revelar que estaba endemoniado, ni mucho menos si él conocía de su condición, solamente podemos asumir lo que el texto nos explica; este hombre era parte de los que asistían a la sinagoga. Fue la presencia del Hijo Dios que expuso al demonio, y Jesús no únicamente lo sacó, sino que también reveló la falta de autoridad de los escribas. Por algún tiempo tenían entre ellos una potestad diabólica y ninguno se había percatado, ni mucho menos el demonio temía la autoridad de los escribas. El demonio sabía exactamente quién era Jesús (Hechos 19:13-17) y que no tenía nada en común con él. El uso de pronombres plurales de parte del demonio muestra lo íntimamente que estaba identificado con el hombre por medio de quien hablaba. El demonio identificó claramente la humanidad de Jesús (“Jesús nazareno”) así como su deidad (“el Santo de Dios”). También confesó gran temor de que Jesús podía juzgarlo y enviarlo al abismo. Hoy hay gente muy parecida a este endemoniado: asistiendo a una reunión religiosa, capaces de decir quién es Jesús, e incluso temblando por miedo al juicio; ¡y sin embargo perdidos!'
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-008
        order: 8
        kind: letter_subpoint
        text: A. El mundo cuestiona la autoridad de Jesús
        source_trace_ref: teacher_notes
      - item_id: LES-2024-C1-022-teacher-notes-009
        order: 9
        kind: paragraph
        text: sobre los demonios – (Marcos 1:27) “¡Cállate!” quiere decir literalmente “¡Ponte bozal!” ¿Por qué Jesús no dejó hablar al demonio? Pareciera lógico que Jesús dejara hablar al demonio para dar a conocer su autoridad a los escribas, que estos se amedrentaran al pensar que Jesús era conocido como el Santo de Dios por espíritus inmundos, pero el Salvador no quería, ni necesitaba la ayuda de Satanás y sus ejércitos para decir a la gente quien era él. El demonio no hablaba mentiras, en cambio Jesús le puso bozal. Los discípulos aprendieron del Maestro, Pedro no dejó a Simón continuar su trama de engaño (Hechos 8:14-24) y Pablo después de tres días ordenó callar a la mujer con espíritu de adivinación (Hechos 16:16-24). Jesús usaría la misma expresión (“¡Ponte bozal!”) al calmar la tempestad (Marcos 4:39). Es indudable la autoridad de Jesús sobre la naturaleza y los demonios. La tempestad no tiene nada que comunicar, su continuo sonido produce miedo, por esto Jesús le pone un bozal. Los demonios no tienen nada que comunicar, su continuo sonido produce confusión. La única voz que debemos de escuchar es la de Jesús (Juan 10:27). El demonio trató un último ataque de convulsiones, pero luego tuvo que someterse a la autoridad del Siervo de Dios y salir del hombre. La gente en la sinagoga quedó asombrada y temerosa. Se dio cuenta de que algo nuevo había aparecido en la escena, una nueva doctrina y un nuevo poder. Las multitudes fueron asombradas exactamente como el pueblo de Israel (Santiago 2:19). ¿Cómo esto puede suceder? Este pasaje bíblico nos revela que el conocimiento no liberta, sino el sometimiento a la autoridad de Cristo. Ahora bien, es imposible someterse a alguien que no conocemos, por esto dependemos del estudio bíblico para añadir entendimiento a la razón, pero la virtud de obediencia proviene de un carácter que se rinde ante la autoridad suprema de Dios. La obediencia y el sometimiento son las virtudes que caracterizan a un corazón contrito, humillado y apartado del mal, y por consiguiente imposible de ser tocado por el maligno (1 Juan 5:18).
        source_trace_ref: teacher_notes
