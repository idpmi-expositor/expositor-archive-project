  - source_item_id: LES-2024-C1-021-teacher-notes-002
    section_key: teacher_notes
    order: 2
    kind: paragraph
    source_text: 'presenta a las poblaciones gentiles colindantes con el mar de Galilea y esto con el propósito de mostrar la continuidad del ministerio de Jesús en tierra de gentiles, donde tiempo después queda constancia de comunidades cristianas en la zona (Hch 21:3-4; 27:3). Este relato recuerda al del hombre paralítico que fue traído por sus amigos. Aquí se nos menciona que el hombre era sordo y tartamudo, o sea que tenía dificultad para hablar, esto fue posiblemente porque nació con la capacidad de hablar, pero al no oír le dificultaba el poder expresarse. En ese momento Jesús se aísla de la multitud que le rodea. Es probable que el maestro quisiera menguar el aspecto llamativo del milagro de sanidad y se desentienda el propósito más amplio de su ministerio: la predicación del reino de Dios. Tras entrar en contacto con el enfermo, Jesús mira al cielo en señal de dependencia divina y suspira, término que proviene del griego (stenádzo). Este acto del Señor puede verse como uno en el cual se identifica con el dolor humano. Jesús comprende nuestra situación, por eso es nuestro sumo sacerdote el cual se compadece de nosotros, (Hebreos 8).'
  - source_item_id: LES-2024-C1-021-teacher-notes-003
    section_key: teacher_notes
    order: 3
    kind: letter_subpoint
    source_text: B. Jesús lo hace todo bien – Marcos 7:35-37
  - source_item_id: LES-2024-C1-021-teacher-notes-004
    section_key: teacher_notes
    order: 4
    kind: paragraph
    source_text: 'El hombre recibe la sanidad y esta se describe: “fueron abiertos sus oídos y se desató la ligadura de su lengua”. Pero el maestro ordenó inmediatamente a que no dijesen nada. No obstante, cuánto más lo ordenaba, más lo hacían. Así que no solo la ligadura de la lengua del tartamudo fue liberada, sino la de las multitudes al ser testigos de aquel milagro. El autor del evangelio utiliza el termino griego (juperperisós), se traduce como asombro desmedido,'
  - source_item_id: LES-2024-C1-021-teacher-notes-005
    section_key: teacher_notes
