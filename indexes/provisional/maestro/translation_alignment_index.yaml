    source_text: Tras Jesús abandonar la región de Tiro no presenta un trayecto directo hasta Galilea, parece un deambular impreciso en zigzag. Algunos interpretan que es muestra de desconocimiento geográfico del autor bíblico. Sin embargo, es posible aducir una razón teológica más que geográfica. La zona descrita aquí Notas del Maestro - Parte II
